<div id="searchPanel">
	<button class="search-btn btn btn-light rounded-circle mr-2" (click)="toggleSearchVisibility()">
		<span class="oi oi-magnifying-glass"
			[ngClass]="{'oi-magnifying-glass': !searchVisible, 'oi-x': searchVisible}"></span>
	</button>
	<form class="mt-3" (ngSubmit)="onSubmit()" #myForm="ngForm">
		<div class="form-inline" *ngIf="searchVisible">
			<input class="form-control mr-sm-2" type="search" placeholder="Sök..." aria-label="Search"
				name="searchString" [(ngModel)]="searchString">
			<div class="btn-group">
				<button class="btn btn-success" type="submit">
					<span class="oi oi-magnifying-glass"></span>
				</button>
				<button class="btn btn-success" type="button" (click)="toggleFilterVisibility()">
					<span class="oi oi-chevron-bottom"
						[ngClass]="{'oi-chevron-bottom': !filterVisibile, 'oi-chevron-top': filterVisibile}"></span>
				</button>
			</div>
		</div>

		<div id="filterPanel" class="bg-dark text-light p-4 mt-2" *ngIf="filterVisibile">
			<app-range [label]="'Sök inom radie:'" [min]="1" [max]="1000" [unit]="'km'"
				(withinRangeChange)="onRangeChanged($event)"></app-range>
			<div>
				<label>Vad vill du fiska?</label>
				<ul class="scrollable-list list-unstyled">
					<li *ngFor="let s of species; let i = index">
						<div class="custom-control custom-checkbox">
							<input type="checkbox" class="custom-control-input" [attr.id]="'speciesCheck' + i"
								(click)="onSpeciesClicked(s)">
							<label class="custom-control-label" [attr.for]="'speciesCheck' + i">{{s.name}}</label>
						</div>
					</li>
				</ul>
			</div>
		</div>
	</form>
