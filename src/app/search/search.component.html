<nav class="navbar navbar-dark bg-dark">
	<div class="container">
		<form class="form-inline ml-md-auto pb-2">
			<input class="form-control mr-sm-2" type="search" placeholder="Sök..." aria-label="Search" name="searchString" [(ngModel)]="searchString">
			<div class="btn-group">
				<button class="btn btn-success" type="button" (click)="search()">
					<span class="oi oi-magnifying-glass"></span>
				</button>
				<button class="btn btn-success" type="button" data-toggle="collapse" data-target="#filterPanel">
					<span class="oi oi-chevron-bottom"></span>
				</button>
			</div>
		</form>
	</div>
</nav>
<nav id="filterPanel" class="bg-dark collapse text-light navbar-dark pb-2">
	<div class="container">
		<div class="row">
			<div class="col-md-4">
				<label>Vad vill du fiska?</label>
				<ul class="scrollable-list list-unstyled">
					<li *ngFor="let s of species; let i = index">
						<div class="custom-control custom-checkbox">
							<input type="checkbox" class="custom-control-input" [attr.id]="'speciesCheck' + i" (click)="onSpeciesClicked(s)">
							<label class="custom-control-label" [attr.for]="'speciesCheck' + i">{{s.name}}</label>
						</div>
					</li>
				</ul>
			</div>
			<div class="col-md-4">
				<app-range [label]="'Sök inom radie:'" [min]="1" [max]="1000" [unit]="'km'" (withinRangeChange)="onRangeChanged($event)"></app-range>
			</div>
		</div>
	</div>
</nav>
